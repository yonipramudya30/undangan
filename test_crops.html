<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background-color: #f3f4f6;
      font-family: sans-serif;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .profile-ring {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid #d4af37;
      margin-bottom: 12px;
    }
    .profile-ring img {
      width: 100%;
      height: 100%;
      object-cover: cover;
      object-fit: cover;
    }
    h3 {
      margin: 0;
      font-size: 16px;
      color: #374151;
    }
  </style>
</head>
<body>
  <h1>Compare Groom Crops with Bride</h1>
  <div class="container">
    <div class="card">
      <div class="profile-ring">
        <img src="images/bride.jpg" />
      </div>
      <h3>Mempelai Wanita (Bride)</h3>
    </div>
  </div>

  <h2>Groom Crop Options</h2>
  <div class="container">
    <div class="card">
      <div class="profile-ring">
        <img src="images/test_crop1.jpg" />
      </div>
      <h3>Crop 1 (Y:35-75%, W:70%)</h3>
    </div>
    <div class="card">
      <div class="profile-ring">
        <img src="images/test_crop2.jpg" />
      </div>
      <h3>Crop 2 (Y:36-74%, W:64%)</h3>
    </div>
    <div class="card">
      <div class="profile-ring">
        <img src="images/test_crop3.jpg" />
      </div>
      <h3>Crop 3 (Y:37-72%, W:60%)</h3>
    </div>
    <div class="card">
      <div class="profile-ring">
        <img src="images/test_crop4.jpg" />
      </div>
      <h3>Crop 4 (No Crop)</h3>
    </div>
  </div>
</body>
</html>

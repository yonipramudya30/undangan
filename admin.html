<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Kelola Tamu Undangan | Nawan & Fira</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">

  <style>
    /* ============================================================
       ADMIN PAGE — Inline Styles
       ============================================================ */
    html, body {
      height: 100%;
      background-color: var(--gray-50);
    }

    .admin-header {
      background: var(--white);
      border-bottom: 1px solid var(--gray-100);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .admin-header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .admin-header-monogram {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid var(--gray-300);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-title);
      font-size: 14px;
      color: var(--black-soft);
      font-weight: 400;
    }

    .admin-header-title {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      color: var(--black-soft);
      letter-spacing: 0.05em;
    }

    .admin-header-subtitle {
      font-size: 11px;
      color: var(--gray-400);
      font-weight: 300;
    }

    .admin-header-badge {
      background: var(--black-soft);
      color: var(--white);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .main-content {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .page-title {
      font-family: var(--font-title);
      font-size: 2.5rem;
      font-weight: 300;
      color: var(--black-soft);
      letter-spacing: 0.03em;
      margin-bottom: 6px;
    }

    .page-subtitle {
      font-size: 13px;
      color: var(--gray-400);
      font-weight: 300;
      margin-bottom: 40px;
    }

    /* Floral section divider */
    .floral-header-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .floral-header-row .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--gray-400);
      font-weight: 500;
      white-space: nowrap;
    }

    .floral-header-row .divider-line {
      flex: 1;
      height: 1px;
      background: var(--gray-100);
    }

    /* Link result box */
    #link-result-box {
      display: none;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }

    #link-result-box.visible { display: flex; }

    /* Guest list table */
    .guests-table {
      width: 100%;
      border-collapse: collapse;
    }

    .guests-table th {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gray-400);
      font-weight: 500;
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--gray-100);
      background: var(--gray-50);
    }

    .guests-table td {
      padding: 14px 16px;
      font-size: 13px;
      color: var(--black-soft);
      border-bottom: 1px solid var(--gray-100);
      vertical-align: middle;
    }

    .guests-table tr:last-child td { border-bottom: none; }

    .guests-table tr:hover td { background: var(--gray-50); }

    .guests-table .guest-name-cell {
      font-weight: 500;
      font-family: var(--font-title);
      font-size: 15px;
    }

    .guests-table .link-cell {
      font-family: monospace;
      font-size: 11px;
      color: var(--gray-500);
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .guests-table .action-cell {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--gray-200);
      background: var(--white);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--gray-600);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-icon:hover { background: var(--gray-50); border-color: var(--gray-400); color: var(--black-soft); }
    .btn-icon.danger:hover { background: #FEF2F2; border-color: #FECACA; color: #DC2626; }
    .btn-icon.wa:hover { background: #F0FDF4; border-color: #BBF7D0; color: #16A34A; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray-400);
    }

    .empty-state i { font-size: 32px; margin-bottom: 12px; opacity: 0.3; }
    .empty-state p { font-size: 13px; font-weight: 300; }

    /* Toast admin */
    .admin-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--black-soft);
      color: var(--white);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.03em;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .admin-toast.visible { transform: translateY(0); opacity: 1; }

    /* Stats bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--white);
      border: 1px solid var(--gray-100);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }

    .stat-number {
      font-family: var(--font-title);
      font-size: 2rem;
      font-weight: 300;
      color: var(--black-soft);
      display: block;
    }

    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gray-400);
      font-weight: 500;
      display: block;
      margin-top: 4px;
    }

    /* Floral SVG watermark */
    .page-watermark {
      position: fixed;
      bottom: -60px;
      right: -60px;
      width: 300px;
      height: 300px;
      opacity: 0.025;
      pointer-events: none;
    }

    /* Input group */
    .input-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-row .input-wrap { flex: 1; }

    @media (max-width: 600px) {
      .input-row { flex-direction: column; }
      .stats-bar { grid-template-columns: 1fr; }
      .admin-header { padding: 16px 20px; }
      .main-content { padding: 24px 16px 80px; }
      .page-title { font-size: 1.8rem; }
      .guests-table .link-cell { display: none; }
    }
  </style>
</head>

<body>

  <!-- Floral watermark background -->
  <svg class="page-watermark" viewBox="0 0 300 300" fill="none">
    <ellipse cx="150" cy="150" rx="100" ry="60" stroke="#1A1A17" stroke-width="1.5" transform="rotate(0 150 150)"/>
    <ellipse cx="150" cy="150" rx="100" ry="60" stroke="#1A1A17" stroke-width="1.5" transform="rotate(45 150 150)"/>
    <ellipse cx="150" cy="150" rx="100" ry="60" stroke="#1A1A17" stroke-width="1.5" transform="rotate(90 150 150)"/>
    <ellipse cx="150" cy="150" rx="100" ry="60" stroke="#1A1A17" stroke-width="1.5" transform="rotate(135 150 150)"/>
    <circle cx="150" cy="150" r="20" stroke="#1A1A17" stroke-width="2" fill="none"/>
    <circle cx="150" cy="150" r="6" fill="#1A1A17"/>
  </svg>

  <!-- Header -->
  <header class="admin-header">
    <div class="admin-header-logo">
      <div class="admin-header-monogram">B&F</div>
      <div>
        <div class="admin-header-title">Admin Undangan</div>
        <div class="admin-header-subtitle">Nawan & Fira — 8 Agustus 2026</div>
      </div>
    </div>
    <div class="admin-header-badge">
      <i class="fas fa-lock mr-1" style="font-size:9px;"></i> Admin Panel
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Page Title -->
    <div style="margin-bottom: 32px;">
      <h1 class="page-title">Kelola Tamu Undangan</h1>
      <p class="page-subtitle">Tambahkan nama tamu dan bagikan link undangan personal kepada mereka.</p>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-card">
        <span class="stat-number" id="stat-total">0</span>
        <span class="stat-label">Total Tamu</span>
      </div>
      <div class="stat-card">
        <span class="stat-number" id="stat-shared">0</span>
        <span class="stat-label">Link Dibagikan</span>
      </div>
      <div class="stat-card">
        <span class="stat-number" id="stat-pending">0</span>
        <span class="stat-label">Belum Dibagikan</span>
      </div>
    </div>

    <!-- ─── Add Guest Form ─── -->
    <div class="floral-header-row">
      <span class="section-label">Tambah Tamu Baru</span>
      <div class="divider-line">
        <svg viewBox="0 0 100 4" width="100" height="4" style="display:block;">
          <path d="M0,2 Q25,0 50,2 Q75,4 100,2" stroke="var(--gray-200)" stroke-width="0.8" fill="none"/>
        </svg>
      </div>
    </div>

    <div class="admin-card" style="padding: 28px; margin-bottom: 40px;">
      <!-- Decorative floral line -->
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:24px; opacity:0.5;">
        <svg viewBox="0 0 200 20" width="100%" height="20">
          <path d="M0,10 Q50,2 100,10 Q150,18 200,10" stroke="var(--gray-300)" stroke-width="0.8" fill="none"/>
          <ellipse cx="50" cy="6" rx="5" ry="3" stroke="var(--gray-300)" stroke-width="0.7" fill="none"/>
          <ellipse cx="100" cy="10" rx="6" ry="3.5" stroke="var(--gray-300)" stroke-width="0.7" fill="none"/>
          <ellipse cx="150" cy="14" rx="5" ry="3" stroke="var(--gray-300)" stroke-width="0.7" fill="none"/>
          <circle cx="50" cy="6" r="1.5" fill="var(--gray-300)"/>
          <circle cx="100" cy="10" r="1.8" fill="var(--gray-300)"/>
          <circle cx="150" cy="14" r="1.5" fill="var(--gray-300)"/>
        </svg>
      </div>

      <div class="input-row">
        <div class="input-wrap">
          <label for="input-nama" style="display:block; font-size:10px; text-transform:uppercase; letter-spacing:0.12em; color:var(--gray-400); font-weight:500; margin-bottom:8px;">
            Nama Lengkap Tamu
          </label>
          <input type="text" id="input-nama" class="admin-input" placeholder="Contoh: Bapak Agus Santoso"
            autocomplete="off" autocorrect="off" spellcheck="false">
        </div>
        <div style="min-width:140px;">
          <label style="display:block; font-size:10px; text-transform:uppercase; letter-spacing:0.12em; color:var(--gray-400); font-weight:500; margin-bottom:8px; opacity:0;">
            &nbsp;
          </label>
          <button class="admin-btn-primary" id="btn-add-guest" onclick="addGuest()">
            <i class="fas fa-plus"></i> Tambah
          </button>
        </div>
      </div>

      <!-- Live link preview -->
      <div id="link-result-box" style="margin-top:16px; display:none; flex-direction:column; gap:12px;">
        <div>
          <label style="display:block; font-size:10px; text-transform:uppercase; letter-spacing:0.12em; color:var(--gray-400); font-weight:500; margin-bottom:8px;">
            Preview Link Undangan
          </label>
          <div class="admin-link-preview" id="link-preview-text">
            —
          </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
          <button class="admin-btn-secondary" id="btn-copy-preview" onclick="copyPreviewLink()">
            <i class="far fa-copy"></i> Salin Link
          </button>
          <button class="btn-wa" id="btn-wa-preview" onclick="sharePreviewWA()">
            <i class="fab fa-whatsapp"></i> Bagikan WA
          </button>
        </div>
      </div>
    </div>

    <!-- ─── Guest List ─── -->
    <div class="floral-header-row">
      <span class="section-label">Daftar Tamu</span>
      <div class="divider-line"></div>
      <button onclick="clearAllGuests()" style="font-size:10px; color:var(--gray-400); background:none; border:none; cursor:pointer; white-space:nowrap; padding:4px 8px; border-radius:6px; transition:all 0.15s; font-family:var(--font-body);" onmouseover="this.style.background='var(--gray-100)'" onmouseout="this.style.background='none'">
        <i class="fas fa-trash-alt" style="margin-right:4px;"></i>Hapus Semua
      </button>
    </div>

    <div class="admin-card" style="overflow:hidden; padding:0;">
      <div id="guest-list-container">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- ─── Wishes List ─── -->
    <div class="floral-header-row" style="margin-top: 40px;">
      <span class="section-label">Ucapan & Doa Restu</span>
      <div class="divider-line"></div>
      <button onclick="clearAllWishes()" style="font-size:10px; color:var(--gray-400); background:none; border:none; cursor:pointer; white-space:nowrap; padding:4px 8px; border-radius:6px; transition:all 0.15s; font-family:var(--font-body);" onmouseover="this.style.background='var(--gray-100)'" onmouseout="this.style.background='none'">
        <i class="fas fa-trash-alt" style="margin-right:4px;"></i>Hapus Semua
      </button>
    </div>

    <div class="admin-card" style="overflow:hidden; padding:0; margin-bottom: 40px;">
      <div id="wishes-list-container">
        <!-- Populated by JS -->
      </div>
    </div>

  </main>

  <!-- Admin Toast -->
  <div class="admin-toast" id="admin-toast">
    <i class="fas fa-check-circle" style="color: #6EE7B7;"></i>
    <span id="admin-toast-text">Berhasil!</span>
  </div>

  <script>
    // ============================================================
    // ADMIN PANEL SCRIPT
    // ============================================================

    const STORAGE_KEY = 'wedding_admin_guests';
    const BASE_URL = window.location.origin + window.location.pathname.replace('admin.html', 'index.html');

    // State
    let guests = [];
    let toastTimer = null;

    // ─── Initialize ─────────────────────────────────────────────
    function init() {
      loadGuests();
      renderGuestList();
      updateStats();

      loadWishes();
      renderWishesList();

      // Live link preview on typing
      const nameInput = document.getElementById('input-nama');
      nameInput.addEventListener('input', () => {
        const name = nameInput.value.trim();
        const box = document.getElementById('link-result-box');
        if (name.length > 0) {
          const link = generateLink(name);
          document.getElementById('link-preview-text').textContent = link;
          box.style.display = 'flex';
          box.style.flexDirection = 'column';
        } else {
          box.style.display = 'none';
        }
      });

      // Enter key to add
      nameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') addGuest();
      });
    }

    // ─── Generate personalized link ─────────────────────────────
    function generateLink(name) {
      return BASE_URL + '?to=' + encodeURIComponent(name);
    }

    // ─── Load/Save from localStorage ────────────────────────────
    function loadGuests() {
      guests = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    }

    function saveGuests() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(guests));
    }

    // ─── Add Guest ───────────────────────────────────────────────
    function addGuest() {
      const nameInput = document.getElementById('input-nama');
      const name = nameInput.value.trim();

      if (!name) {
        showAdminToast('Masukkan nama tamu terlebih dahulu.', true);
        nameInput.focus();
        return;
      }

      // Check duplicate
      if (guests.find(g => g.name.toLowerCase() === name.toLowerCase())) {
        showAdminToast('Nama tamu ini sudah ada dalam daftar.', true);
        return;
      }

      const newGuest = {
        id: Date.now(),
        name: name,
        link: generateLink(name),
        shared: false,
        addedAt: new Date().toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' })
      };

      guests.unshift(newGuest);
      saveGuests();
      renderGuestList();
      updateStats();

      // Reset
      nameInput.value = '';
      document.getElementById('link-result-box').style.display = 'none';
      nameInput.focus();

      showAdminToast(`✓ ${name} berhasil ditambahkan!`);
    }

    // ─── Copy preview link ───────────────────────────────────────
    function copyPreviewLink() {
      const link = document.getElementById('link-preview-text').textContent;
      if (!link || link === '—') return;
      navigator.clipboard.writeText(link).then(() => {
        showAdminToast('Link berhasil disalin!');
      });
    }

    // ─── Share preview link via WA ───────────────────────────────
    function sharePreviewWA() {
      const link = document.getElementById('link-preview-text').textContent;
      const name = document.getElementById('input-nama').value.trim() || 'Tamu';
      if (!link || link === '—') return;
      const msg = `Assalamu'alaikum ${name},\n\nKami mengundang Anda untuk menghadiri pernikahan kami:\n\n*Nawan & Fira*\nSabtu, 8 Agustus 2026\n\nSilakan buka undangan online Anda di sini:\n${link}\n\nMerupakan suatu kehormatan jika Anda berkenan hadir. 🤍`;
      window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
    }

    // ─── Copy link for a specific guest ─────────────────────────
    function copyGuestLink(id) {
      const guest = guests.find(g => g.id === id);
      if (!guest) return;
      navigator.clipboard.writeText(guest.link).then(() => {
        // Mark as shared
        guest.shared = true;
        saveGuests();
        renderGuestList();
        updateStats();
        showAdminToast('Link disalin — tandai sebagai dibagikan.');
      });
    }

    // ─── Share via WhatsApp for a specific guest ─────────────────
    function shareGuestWA(id) {
      const guest = guests.find(g => g.id === id);
      if (!guest) return;
      const msg = `Assalamu'alaikum ${guest.name},\n\nKami mengundang Anda untuk menghadiri pernikahan kami:\n\n*Nawan & Fira*\nSabtu, 8 Agustus 2026\n\nSilakan buka undangan online Anda di sini:\n${guest.link}\n\nMerupakan suatu kehormatan jika Anda berkenan hadir. 🤍`;
      window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
      // Mark as shared
      guest.shared = true;
      saveGuests();
      renderGuestList();
      updateStats();
    }

    // ─── Toggle shared status ────────────────────────────────────
    function toggleShared(id) {
      const guest = guests.find(g => g.id === id);
      if (!guest) return;
      guest.shared = !guest.shared;
      saveGuests();
      renderGuestList();
      updateStats();
    }

    // ─── Remove Guest ────────────────────────────────────────────
    function removeGuest(id) {
      const guest = guests.find(g => g.id === id);
      if (!confirm(`Hapus tamu "${guest ? guest.name : ''}" dari daftar?`)) return;
      guests = guests.filter(g => g.id !== id);
      saveGuests();
      renderGuestList();
      updateStats();
      showAdminToast('Tamu dihapus dari daftar.');
    }

    // ─── Clear All ───────────────────────────────────────────────
    function clearAllGuests() {
      if (guests.length === 0) return;
      if (!confirm('Hapus semua tamu dari daftar? Tindakan ini tidak dapat dibatalkan.')) return;
      guests = [];
      saveGuests();
      renderGuestList();
      updateStats();
      showAdminToast('Semua tamu dihapus.');
    }

    // ─── Render Guest List ───────────────────────────────────────
    function renderGuestList() {
      const container = document.getElementById('guest-list-container');

      if (guests.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-user-plus"></i>
            <p>Belum ada tamu ditambahkan.<br>Gunakan form di atas untuk menambahkan tamu.</p>
          </div>
        `;
        return;
      }

      const rows = guests.map(g => `
        <tr>
          <td>
            <div class="guest-name-cell">${escapeHtml(g.name)}</div>
            <div style="font-size:10px; color:var(--gray-400); margin-top:2px;">${g.addedAt}</div>
          </td>
          <td class="link-cell">${escapeHtml(g.link)}</td>
          <td>
            <span style="
              display:inline-flex; align-items:center; gap:4px;
              font-size:10px; font-weight:500; padding:3px 10px; border-radius:20px;
              cursor:pointer; transition: all 0.15s;
              background: ${g.shared ? 'var(--black-soft)' : 'var(--gray-100)'};
              color: ${g.shared ? 'var(--white)' : 'var(--gray-500)'};
              border: 1px solid ${g.shared ? 'var(--black-soft)' : 'var(--gray-200)'};
            " onclick="toggleShared(${g.id})" title="Klik untuk ubah status">
              ${g.shared ? '<i class="fas fa-check" style="font-size:8px;"></i> Dibagikan' : '<i class="fas fa-clock" style="font-size:8px;"></i> Belum'}
            </span>
          </td>
          <td>
            <div class="action-cell">
              <button class="btn-icon" onclick="copyGuestLink(${g.id})" title="Salin Link">
                <i class="far fa-copy"></i>
              </button>
              <button class="btn-icon wa" onclick="shareGuestWA(${g.id})" title="Bagikan ke WhatsApp">
                <i class="fab fa-whatsapp"></i>
              </button>
              <button class="btn-icon danger" onclick="removeGuest(${g.id})" title="Hapus Tamu">
                <i class="fas fa-trash-alt"></i>
              </button>
            </div>
          </td>
        </tr>
      `).join('');

      container.innerHTML = `
        <table class="guests-table">
          <thead>
            <tr>
              <th>Nama Tamu</th>
              <th class="link-cell" style="display:table-cell;">Link Undangan</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    // ─── Update Stats ────────────────────────────────────────────
    function updateStats() {
      const total = guests.length;
      const shared = guests.filter(g => g.shared).length;
      const pending = total - shared;

      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-shared').textContent = shared;
      document.getElementById('stat-pending').textContent = pending;
    }

    // ─── Toast Notification ──────────────────────────────────────
    function showAdminToast(msg, isError = false) {
      const toast = document.getElementById('admin-toast');
      const text  = document.getElementById('admin-toast-text');
      const icon  = toast.querySelector('i');

      text.textContent = msg;
      icon.style.color = isError ? '#FCA5A5' : '#6EE7B7';

      toast.classList.add('visible');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('visible'), 2800);
    }

    // ─── Escape HTML ─────────────────────────────────────────────
    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ============================================================
    // WISHES ADMIN
    // ============================================================
    const WISHES_KEY = 'wedding_wishes';
    let wishes = [];

    function loadWishes() {
      wishes = JSON.parse(localStorage.getItem(WISHES_KEY)) || [];
    }

    function saveWishes() {
      localStorage.setItem(WISHES_KEY, JSON.stringify(wishes));
    }

    function removeWish(idx) {
      if (!confirm('Hapus ucapan ini?')) return;
      wishes.splice(idx, 1);
      saveWishes();
      renderWishesList();
      showAdminToast('Ucapan dihapus.');
    }

    function clearAllWishes() {
      if (wishes.length === 0) return;
      if (!confirm('Hapus semua ucapan?')) return;
      wishes = [];
      saveWishes();
      renderWishesList();
      showAdminToast('Semua ucapan dihapus.');
    }

    function renderWishesList() {
      const container = document.getElementById('wishes-list-container');
      if (wishes.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-comment-slash"></i>
            <p>Belum ada ucapan & doa restu.</p>
          </div>
        `;
        return;
      }

      const rows = wishes.map((w, idx) => `
        <tr>
          <td>
            <div class="guest-name-cell">${escapeHtml(w.nama)}</div>
            <div style="font-size:10px; color:var(--gray-400); margin-top:2px;">${escapeHtml(w.waktu)}</div>
          </td>
          <td>
            <span style="display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:500; padding:3px 10px; border-radius:20px; background: ${w.kehadiran === 'hadir' ? 'var(--black-soft)' : 'var(--gray-100)'}; color: ${w.kehadiran === 'hadir' ? 'var(--white)' : 'var(--gray-500)'}; border: 1px solid ${w.kehadiran === 'hadir' ? 'var(--black-soft)' : 'var(--gray-200)'};">
              ${w.kehadiran === 'hadir' ? 'Hadir' : 'Berhalangan'}
            </span>
          </td>
          <td style="font-size:12px; line-height: 1.5; color:var(--gray-600); max-width: 300px;">
            ${escapeHtml(w.ucapan)}
          </td>
          <td>
            <div class="action-cell">
              <button class="btn-icon danger" onclick="removeWish(${idx})" title="Hapus Ucapan">
                <i class="fas fa-trash-alt"></i>
              </button>
            </div>
          </td>
        </tr>
      `).join('');

      container.innerHTML = `
        <table class="guests-table">
          <thead>
            <tr>
              <th>Nama Tamu</th>
              <th>Kehadiran</th>
              <th>Ucapan</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    // ─── Boot ────────────────────────────────────────────────────
    init();
  </script>

</body>

</html>
